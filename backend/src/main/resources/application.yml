spring:
  datasource:
    url: jdbc:${DATABASE_URL}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
    timeout: 24h

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        same-site: ${SESSION_COOKIE_SAME_SITE:none}
        secure: ${SESSION_COOKIE_SECURE:true}
        http-only: true

storage:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:}        # blank = native AWS S3; set for Cloudflare R2 or MinIO
    access-key: ${S3_ACCESS_KEY:}    # blank = use EC2 IAM role; set for R2/custom
    secret-key: ${S3_SECRET_KEY:}
    public-url: ${S3_PUBLIC_URL}     # CloudFront URL or S3/R2 public bucket URL

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
